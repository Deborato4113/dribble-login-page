<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dribbble Signup</title>

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="page">

        <div class="image">

            <button onclick="window.location.href='https://dribbble.com/';" class="back">
                Back to Website →
            </button>

            <p class="tagline">
                Capturing Moments,<br>
                Creating Memories
            </p>

        </div>

        <div class="form">

            <h2>Create an Account</h2>

            <p>
                Already have an account?
                <a href="https://dribbble.com/session/new">Log In</a>
            </p>

            <form>

                <div class="Input_Credentials">
                    <input type="text" placeholder="First Name" required>
                    <input type="text" placeholder="Last Name" required>
                </div>

                <input type="email" placeholder="Email" required>

                <div class="password-field">
                    <input type="password" id="password" placeholder="Enter Password" required>

                    <span class="eye-icon">
                        <img id="togglePassword"
                            src="https://cdn-icons-png.flaticon.com/512/709/709612.png"
                            alt="Show Password">
                    </span>
                </div>

                <div class="checkbox">
                    <input type="checkbox" id="terms" required>

                    <label for="terms">
                        I agree to the
                        <a href="https://dribbble.com/terms">
                            Terms & Conditions
                        </a>
                    </label>
                </div>

                <button type="submit" class="Create">
                    Create Account
                </button>

            </form>

            <div class="separator">
                Or register with
            </div>

            <div class="apps">

                <button class="Google">
                    <img src="https://www.gstatic.com/marketing-cms/assets/images/d5/dc/cfe9ce8b4425b410b49b7f2dd3f3/g.webp">
                    Google
                </button>

                <button class="Apple">
                    <img src="https://cdn4.iconfinder.com/data/icons/proglyphs-free/512/Apple-128.png">
                    Apple
                </button>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
